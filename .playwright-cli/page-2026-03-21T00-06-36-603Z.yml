        - generic [ref=e366]:
          - heading "How do I get started and integrate OneTutor into my course?" [level=2] [ref=e371] [cursor=pointer]
          - paragraph [ref=e373]:
            - text: 👉 If your university is already connected, simply log in with SSO. Otherwise, contact us to request a Guest Login.
            - text: ‍
            - text: Our system is fully pseudonymized, so we need to manually assign you the lecturer role.
            - text: Upload your course materials (lecture slides, readings, recordings, etc.) to enable AI-powered tutoring tailored to your content.
            - text: ‍
            - text: Generate hundreds of quizzes in minutes to engage your students.
            - text: Analyze student engagement, identify learning gaps, and improve your lectures accordingly.
        - generic [ref=e374]:
          - heading "How does the AI of OneTutor work and ensure accurate responses?" [level=2] [ref=e379] [cursor=pointer]
          - paragraph [ref=e381]:
            - text: 👉 OneTutor uses Retrieval-Augmented Generation (RAG) to pull information directly from your uploaded materials.
            - text: ‍
            - text: The AI understands student queries and generates contextually relevant, course-specific responses.
            - text: OneTutor relies on your uploaded course materials to ensure accuracy and relevance. If no relevant information is found, it transparently communicates this to students.
            - text: ‍
            - text: While AI is not infallible, OneTutor is designed to minimize errors by referencing the sources of its responses. For quiz generation, we implement a Human-in-the-Loop approach - you have the ability to review and proofread each AI-generated question before it is made available.
            - text: ‍
            - text: Through student feedback, the AI system can be adjusted to improve accuracy and to edit or remove unreliable questions.
        - generic [ref=e382]:
          - heading "Who owns the content I upload to OneTutor?" [level=2] [ref=e387] [cursor=pointer]
          - paragraph [ref=e389]:
            - text: 👉 You retain full ownership of all content uploaded to OneTutor.
            - text: We do not claim any rights over your materials - they are used only to support student learning.
            - text: OneTutor follows strict security measures to protect your intellectual property.
        - generic [ref=e390]:
          - heading "Do you offer a trial or demo for lecturers?" [level=2] [ref=e395] [cursor=pointer]
          - paragraph [ref=e397]:
