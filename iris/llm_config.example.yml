# ── Chat models (GPT-5 family) ───────────────────────────────────────────────
- id: oai-gpt-52
  type: openai_chat
  model: gpt-5.2
  api_key:
  cost_per_million_input_token: 3.0
  cost_per_million_output_token: 12.0
- id: oai-gpt-5-mini
  type: openai_chat
  model: gpt-5-mini
  api_key:
  cost_per_million_input_token: 0.4
  cost_per_million_output_token: 1.6
- id: oai-gpt-5-nano
  type: openai_chat
  model: gpt-5-nano
  api_key:
  cost_per_million_input_token: 0.1
  cost_per_million_output_token: 0.4

# ── Azure example (GPT 5 Mini) ──────────────────────────────────────────────
- id: azure-gpt-5-mini
  type: azure_chat
  model: gpt-5-mini
  api_key:
  api_version: 2025-04-01-preview
  azure_deployment: gpt-5-mini
  endpoint: "<your-endpoint>"
  cost_per_million_input_token: 0.4
  cost_per_million_output_token: 1.6

# ── Embedding models ─────────────────────────────────────────────────────────
- id: azure-embedding-large
  type: azure_embedding
  model: text-embedding-3-large
  api_key:
  api_version: "2023-05-15"
  azure_deployment: te-3-large
  endpoint: "<your-endpoint>"
  cost_per_million_input_token: 0.13
- id: oai-embedding-small
  type: openai_embedding
  model: text-embedding-3-small
  api_key:
  cost_per_million_input_token: 0.02

# ── Reranker ─────────────────────────────────────────────────────────────────
- id: cohere
  type: cohere_azure
  model: "rerank-multilingual-v3.5"
  api_key:
  endpoint: "your_cohere-endpoint"
  cost_per_1k_requests: 2

