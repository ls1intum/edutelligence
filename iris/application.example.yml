api_keys:
  - token: "secret"

weaviate:
  host: "localhost"
  port: "8001"
  grpc_port: "50051"

memiris:
  enabled: true
  sleep_enabled: true
  llm_configuration:
    embeddings:
      - mxbai-embed-large
      - nomic-embed-text
    learning_extractor:
      local: gemma3
      cloud: gemma3
    learning_deduplicator:
      local: gemma3
      cloud: gemma3
    memory_creator:
      local: gpt-oss
      cloud: gpt-oss
    sleep_tool_llm:
      local: gpt-oss
      cloud: gpt-oss
    sleep_json_llm:
      local: gemma3
      cloud: gemma3

local_llm_enabled: true # Set to false to disable local LLM support entirely

langfuse:
  enabled: false # Set to true to enable LangFuse tracing
  public_key: "pk-lf-..." # Your LangFuse public key
  secret_key: "sk-lf-..." # Your LangFuse secret key  # pragma: allowlist secret
  host: "https://cloud.langfuse.com" # Or your self-hosted instance URL

env_vars:
  SOME: "value"

# Values are LLM entry IDs (the "id" field in llm_config.yml).
llm_configuration:
  exercise_chat_pipeline:
    default:
      chat:
        local: oai-gpt-5-mini
        cloud: oai-gpt-5-mini
    advanced:
      chat:
        local: oai-gpt-52
        cloud: oai-gpt-52

  course_chat_pipeline:
    default:
      chat:
        local: oai-gpt-5-mini
        cloud: oai-gpt-5-mini
    advanced:
      chat:
        local: oai-gpt-52
        cloud: oai-gpt-52

  lecture_chat_pipeline:
    default:
      chat:
        local: oai-gpt-5-mini
        cloud: oai-gpt-5-mini
    advanced:
      chat:
        local: oai-gpt-52
        cloud: oai-gpt-52

  text_exercise_chat_pipeline:
    default:
      chat:
        local: oai-gpt-5-mini
        cloud: oai-gpt-5-mini
    advanced:
      chat:
        local: oai-gpt-52
        cloud: oai-gpt-52

  autonomous_tutor_pipeline:
    default:
      chat:
        local: gpt-oss
        cloud: oai-gpt-5-mini

  tutor_suggestion_pipeline:
    default:
