controller:
  port: 8444
  api_key: RANDOM_DEFAULT_KEY
  tls_enabled: false
  tls_cert_path: certs/cert.pem
  tls_key_path: certs/key.pem
  gpu_poll_interval: 5
  ollama_poll_interval: 5
  lane_port_start: 11436
  lane_port_end: 11499
ollama:
  ollama_binary: /usr/local/bin/ollama
  port: 11435
  gpu_devices: all
  num_parallel: 4
  max_loaded_models: 2
  keep_alive: 10m
  max_queue: 512
  context_length: 1024
  flash_attention: true
  kv_cache_type: q8_0
  sched_spread: false
  multiuser_cache: false
  gpu_overhead_bytes: 0
  load_timeout: ''
  origins: []
  noprune: false
  llm_library: cuda_v12
  models_path: /usr/share/ollama/.ollama/models
  preload_models: []
  env_overrides: {}
lanes: []
