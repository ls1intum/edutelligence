# GPU overlay — enable GPU access for metrics via NVIDIA Container Toolkit.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#
# Requires NVIDIA Container Toolkit on the host.

services:
  node-controller:
    # Let the runtime inject GPU device nodes and driver libs.
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility,compute
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility, compute]
