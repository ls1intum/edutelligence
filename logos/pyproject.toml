[tool.black]
line-length = 120
target-version = ["py313"]
extend-exclude = '''
/(
  | \.venv
  | shared
  | logos-ui
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip = ["shared", ".venv", "logos-ui"]
# Pin first-party detection: without this, isort classifies `logos` imports
# differently depending on invocation directory and environment, so local
# runs and CI (--all-files from the repo root) disagree.
known_first_party = ["logos", "logos_worker_node", "grpclocal", "shared"]
