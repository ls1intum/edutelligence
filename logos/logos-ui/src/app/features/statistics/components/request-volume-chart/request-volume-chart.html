<div class="rv-chart">

  <!-- ── Mode switch ──────────────────────────────────────────────────── -->
  <div class="rv-header">
    <app-stats-segmented-switch
      [options]="modeOptions"
      [value]="mode()"
      (valueChange)="setMode($event)"
    />
  </div>

  <!-- ── Chart or empty ───────────────────────────────────────────────── -->
  @if (!hasData()) {
    <div class="rv-empty">No request data available.</div>
  } @else {
    <div
      class="rv-wrap"
      [class.rv-wrap--dragging]="isDraggingSig()"
    >
      <svg
        class="rv-svg"
        [attr.viewBox]="'0 0 ' + CHART_W + ' ' + CHART_H"
        aria-hidden="true"
        focusable="false"
        (mousedown)="onMouseDown($event)"
        (mousemove)="onMouseMove($event); onPlotMove($event)"
        (mouseup)="onMouseUp($event)"
        (mouseleave)="onPlotLeave()"
      >
        <!-- baseline -->
        <line
          [attr.x1]="CHART_PAD_LEFT"
          [attr.y1]="CHART_H - CHART_PAD_BOTTOM"
          [attr.x2]="CHART_W - CHART_PAD_RIGHT"
          [attr.y2]="CHART_H - CHART_PAD_BOTTOM"
          class="rv-baseline"
        />

        <!-- grid lines + y-axis labels -->
        @for (gl of chartData().gridLines; track gl.y) {
          <line
            [attr.x1]="CHART_PAD_LEFT"
            [attr.y1]="gl.y"
            [attr.x2]="CHART_W - CHART_PAD_RIGHT"
            [attr.y2]="gl.y"
            class="rv-grid"
          />
          <text
            [attr.x]="CHART_PAD_LEFT - 5"
            [attr.y]="gl.y"
            class="rv-lbl-y"
            text-anchor="end"
            dominant-baseline="middle"
          >{{ gl.label }}</text>
        }

        <!-- stacked bar segments -->
        @for (rect of chartData().rects; track $index) {
          @if (rect.isTop) {
            <path
              [attr.d]="roundedTopPath(rect)"
              [attr.fill]="rect.color"
              class="rv-bar"
            />
          } @else {
            <rect
              [attr.x]="rect.x"
              [attr.y]="rect.y"
              [attr.width]="rect.width"
              [attr.height]="rect.height"
              [attr.fill]="rect.color"
              class="rv-bar"
            />
          }
        }

        <!-- total line (provider mode) -->
        @if (mode() === 'provider' && totalLinePath()) {
          <path
            [attr.d]="totalLinePath()"
            class="rv-total-line"
          />
        }

        <!-- crosshair vertical guide -->
        @if (crosshair(); as ch) {
          <line
            [attr.x1]="ch.x" [attr.x2]="ch.x"
            [attr.y1]="chartData().plotTop" [attr.y2]="chartData().plotBottom"
            class="rvc-crosshair"
          />
        }

        <!-- zoom selection overlay -->
        @if (isDraggingSig() && zoomSelW() > 0) {
          <rect
            [attr.x]="zoomSelX()"
            [attr.y]="CHART_PAD_TOP"
            [attr.width]="zoomSelW()"
            [attr.height]="CHART_H - CHART_PAD_TOP - CHART_PAD_BOTTOM"
            class="zoom-sel"
            pointer-events="none"
          />
        }

        <!-- x-axis labels -->
        @for (lbl of chartData().xLabels; track lbl.x) {
          <text
            [attr.x]="lbl.x"
            [attr.y]="CHART_H - 5"
            class="rv-lbl-x"
            text-anchor="middle"
          >{{ lbl.label }}</text>
        }
      </svg>

    </div>

    <!-- ── Legend ──────────────────────────────────────────────────────── -->
    <div class="rv-legend">
      @for (item of legendItems(); track item.key) {
        <button
          class="rvc-legend__item"
          [class.rvc-legend__item--off]="isHidden(item.key)"
          type="button"
          (click)="toggleSeries(item.key)"
        >
          <span class="rvc-legend__dot" [style.background]="item.color" aria-hidden="true"></span>
          {{ item.label }}
        </button>
      }
    </div>
  }

</div>
