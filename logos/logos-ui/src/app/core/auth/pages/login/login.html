<div class="login-page">
  <app-orbs />
  <app-theme-toggle />

  <section class="login-card" aria-label="Login">
      <header class="login-header">
        <app-logo [size]="48" />

        <h1 class="logo-name">logos</h1>
      </header>

      <form class="login-form" (ngSubmit)="submit()">
        <label class="field">
          <h2 class="field__label">API key</h2>

          <div class="field__control">
            <input
              type="password"
              [ngModel]="key()"
              (ngModelChange)="key.set($event)"
              name="key"
              placeholder="logos-key-…"
              autocomplete="current-password"
              autocapitalize="off"
              spellcheck="false"
              [disabled]="loading()"
              [attr.aria-invalid]="!!error()"
            />

            <i class="pi pi-key field__icon" aria-hidden="true"></i>
          </div>
        </label>

        @if (error()) {
          <app-error-message [message]="error()" variant="dialog" />
        }

        <button
          class="btn-primary login-button"
          type="submit"
          [disabled]="loading() || !key().trim()"
        >
          @if (loading()) {
            <i class="pi pi-spin pi-spinner"></i>
            Signing in…
          } @else {
            Sign in
          }
        </button>
      </form>
  </section>
</div>
