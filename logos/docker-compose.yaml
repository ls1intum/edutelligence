# docker-compose.yaml — Production (pulls pre-built images from GHCR)
# For local development, use: docker compose -f docker-compose.dev.yaml up --build
services:
  traefik:
    image: traefik:v3.6.1
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.secure8080.address=:8080"
      - "--entrypoints.admin.address=:9443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--api.dashboard=true"
    ports:
      - "${LOGOS_TRAEFIK_HTTPS_PORT:-443}:443"
      - "${LOGOS_TRAEFIK_SECURE8080_PORT:-8080}:8080"
      - "${LOGOS_TRAEFIK_ADMIN_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - internal

  logos-server:
    image: ghcr.io/ls1intum/edutelligence/logos:${IMAGE_TAG:-latest}
    container_name: logos-server
    restart: unless-stopped
    depends_on:
      logos-db:
        condition: service_healthy
    volumes:
      - data_volume:/src/logos
    environment:
      LOGOS_DOMAIN: "${LOGOS_DOMAIN:-localhost}"
      LOGOS_CAPACITY_PLANNER_ENABLED: "${LOGOS_CAPACITY_PLANNER_ENABLED:-true}"
      LOGOS_NODE_DEV_ALLOW_INSECURE_HTTP: "${LOGOS_NODE_DEV_ALLOW_INSECURE_HTTP:-}"
      PROMETHEUS_API_KEY: "${PROMETHEUS_API_KEY:-}"
      LOGOS_INTERNAL_SECRET: "${LOGOS_INTERNAL_SECRET:-}"
      TZ: "${TZ:-Europe/Berlin}"
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"

      # ── User-facing routes (ports 443 + 8080) ──

      # === Routing: /v1 ===
      - "traefik.http.routers.logos-server-v1.rule=PathPrefix(`/v1`)"
      - "traefik.http.routers.logos-server-v1.entrypoints=websecure,secure8080"
      - "traefik.http.routers.logos-server-v1.tls=true"
      - "traefik.http.routers.logos-server-v1.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-server-v1.service=logos-server"
      - "traefik.http.routers.logos-server-v1.priority=100"

      # === Routing: /openai ===
      - "traefik.http.routers.logos-server-openai.rule=PathPrefix(`/openai`)"
      - "traefik.http.routers.logos-server-openai.entrypoints=websecure,secure8\
        080"
      - "traefik.http.routers.logos-server-openai.tls=true"
      - "traefik.http.routers.logos-server-openai.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-server-openai.service=logos-server"
      - "traefik.http.routers.logos-server-openai.priority=100"

      # === Routing: /jobs ===
      - "traefik.http.routers.logos-server-jobs.rule=PathPrefix(`/jobs`)"
      - "traefik.http.routers.logos-server-jobs.entrypoints=websecure,secure8080"
      - "traefik.http.routers.logos-server-jobs.tls=true"
      - "traefik.http.routers.logos-server-jobs.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-server-jobs.service=logos-server"
      - "traefik.http.routers.logos-server-jobs.priority=100"

      # ── Admin routes (port 9443) ──

      # === Routing: /api (all UI-internal endpoints) ===
      # Backend strips the `/api` prefix, so adding a new admin endpoint
      # requires no change here — just a new FastAPI route under any path.
      - "traefik.http.routers.logos-server-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.logos-server-api.entrypoints=admin"
      - "traefik.http.routers.logos-server-api.tls=true"
      - "traefik.http.routers.logos-server-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-server-api.service=logos-server"
      - "traefik.http.routers.logos-server-api.priority=100"

      # === Routing: /logosdb/providers/logosnode (workernode protocol) ===
      - "traefik.http.routers.logos-server-logosnode.rule=PathPrefix(`/logosdb/p\
        roviders/logosnode`)"
      - "traefik.http.routers.logos-server-logosnode.entrypoints=admin"
      - "traefik.http.routers.logos-server-logosnode.tls=true"
      - "traefik.http.routers.logos-server-logosnode.tls.certresolver=letsencry\
        pt"
      - "traefik.http.routers.logos-server-logosnode.service=logos-server"
      - "traefik.http.routers.logos-server-logosnode.priority=100"

      # === Routing: /docs ===
      - "traefik.http.routers.logos-server-docs.rule=PathPrefix(`/docs`) ||
        PathPrefix(`/openapi.json`)"
      - "traefik.http.routers.logos-server-docs.entrypoints=admin"
      - "traefik.http.routers.logos-server-docs.tls=true"
      - "traefik.http.routers.logos-server-docs.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-server-docs.service=logos-server"
      - "traefik.http.routers.logos-server-docs.priority=100"

      # === Routing: /metrics (Prometheus) ===
      - "traefik.http.routers.logos-server-metrics.rule=PathPrefix(`/metrics`)"
      - "traefik.http.routers.logos-server-metrics.entrypoints=admin"
      - "traefik.http.routers.logos-server-metrics.tls=true"
      - "traefik.http.routers.logos-server-metrics.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-server-metrics.service=logos-server"
      - "traefik.http.routers.logos-server-metrics.priority=100"

      # === Routing: /api/logosdb/scheduler_state ===
      - "traefik.http.routers.logos-server-scheduler-state.rule=Path(`/api/logosdb/scheduler_state`)"
      - "traefik.http.routers.logos-server-scheduler-state.entrypoints=admin"
      - "traefik.http.routers.logos-server-scheduler-state.tls=true"
      - "traefik.http.routers.logos-server-scheduler-state.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-server-scheduler-state.service=logos-server"
      - "traefik.http.routers.logos-server-scheduler-state.middlewares=strip-api"
      - "traefik.http.routers.logos-server-scheduler-state.priority=201"

      # Service-Port
      - "traefik.http.services.logos-server.loadbalancer.server.port=8080"
    networks:
      - internal

  logos-webservice:
    image: ghcr.io/ls1intum/edutelligence/logos-webservice:${IMAGE_TAG:-latest}
    container_name: logos-webservice
    restart: unless-stopped
    depends_on:
      logos-db:
        condition: service_healthy
    environment:
      DB_HOST: logos-db
      DB_PORT: 5432
      DB_NAME: logosdb
      DB_USER: postgres
      DB_PASSWORD: root
      LOGOS_ORCHESTRATOR_URL: "http://logos-server:8080"
      LOGOS_INTERNAL_SECRET: "${LOGOS_INTERNAL_SECRET:-}"
      JDK_JAVA_OPTIONS: "-XX:MaxRAMPercentage=80.0"
    expose:
      - "8081"
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"

      # === Routing: /api/me, /api/users, /api/teams ===
      - "traefik.http.routers.webservice-identity.rule=PathPrefix(`/api/me`) || PathPrefix(`/api/users`) || PathPrefix(`/api/teams`)"
      - "traefik.http.routers.webservice-identity.entrypoints=admin"
      - "traefik.http.routers.webservice-identity.tls=true"
      - "traefik.http.routers.webservice-identity.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webservice-identity.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-identity.middlewares=strip-api"
      - "traefik.http.routers.webservice-identity.priority=200"

      # === Routing: /api/logosdb ===
      - "traefik.http.routers.webservice-config.rule=PathPrefix(`/api/logosdb`)"
      - "traefik.http.routers.webservice-config.entrypoints=admin"
      - "traefik.http.routers.webservice-config.tls=true"
      - "traefik.http.routers.webservice-config.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webservice-config.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-config.middlewares=strip-api"
      - "traefik.http.routers.webservice-config.priority=200"

      # === Routing: /api/admin ===
      - "traefik.http.routers.webservice-admin.rule=PathPrefix(`/api/admin`)"
      - "traefik.http.routers.webservice-admin.entrypoints=admin"
      - "traefik.http.routers.webservice-admin.tls=true"
      - "traefik.http.routers.webservice-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webservice-admin.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-admin.middlewares=strip-api"
      - "traefik.http.routers.webservice-admin.priority=200"

      # === Routing: /api/ws/stats, /api/ws/stats/v2 (WebSocket) ===
      - "traefik.http.routers.webservice-ws.rule=Path(`/api/ws/stats`) || Path(`/api/ws/stats/v2`)"
      - "traefik.http.routers.webservice-ws.entrypoints=admin"
      - "traefik.http.routers.webservice-ws.tls=true"
      - "traefik.http.routers.webservice-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webservice-ws.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-ws.middlewares=strip-api"
      - "traefik.http.routers.webservice-ws.priority=200"

      # Service-Port
      - "traefik.http.services.logos-webservice-svc.loadbalancer.server.port=8081"
    networks:
      - internal

  logos-db:
    image: ghcr.io/ls1intum/edutelligence/logos-db:${IMAGE_TAG:-latest}
    container_name: logos-db
    restart: unless-stopped
    user: postgres
    command: >
      postgres -c shared_preload_libraries=pg_cron -c cron.database_name=logosdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: logosdb
      POSTGRES_HOST: localhost
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "--username=postgres" ]
      interval: 1s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  logos-ui:
    image: ghcr.io/ls1intum/edutelligence/logos-ui:${IMAGE_TAG:-latest}
    container_name: logos-ui
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - "traefik.enable=true"

      # === UI routing (admin port only) ===
      # Override: set LOGOS_DOMAIN / LOGOS_CERT_RESOLVER in .env
      - "traefik.http.routers.internal-ui.rule=Host(`${LOGOS_DOMAIN:-localhost}\
        `) && PathPrefix(`/`)"
      - "traefik.http.routers.internal-ui.entrypoints=admin"
      - "traefik.http.routers.internal-ui.tls=true"
      - "traefik.http.routers.internal-ui.tls.certresolver=letsencrypt"
      - "traefik.http.routers.internal-ui.service=internal-ui-svc"
      - "traefik.http.routers.internal-ui.priority=0"

      # Shared service definition
      - "traefik.http.services.internal-ui-svc.loadbalancer.server.port=80"
    networks:
      - internal

volumes:
  data_volume:
  postgres_data:

networks:
  internal:
    driver: bridge
