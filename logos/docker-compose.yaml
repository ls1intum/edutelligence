# docker-compose.yaml — Production (pulls pre-built images from Harbor)
# For local development, use: docker compose -f docker-compose.dev.yaml up --build
services:
  traefik:
    image: traefik:v3.7.6
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.secure8080.address=:8080"
      - "--entrypoints.admin.address=:9443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--api.dashboard=true"
    ports:
      - "${LOGOS_TRAEFIK_HTTPS_PORT:-443}:443"
      - "${LOGOS_TRAEFIK_SECURE8080_PORT:-8080}:8080"
      - "${LOGOS_TRAEFIK_ADMIN_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    labels:
      # strip-api is referenced by routers on multiple app containers (the
      # orchestrator AND the webservice). Define it here on Traefik itself so it
      # exists the instant Traefik starts. Previously it lived only on the
      # webservice, which blocks on db/keycloak health and so registered the
      # middleware long after the orchestrator had already published routers
      # referencing it — Traefik then spammed "middleware strip-api@docker does
      # not exist" for the orchestrator routes until the webservice came up.
      - "traefik.enable=true"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
    networks:
      - internal

  logos-orchestrator:
    image: ${REGISTRY:-ghcr.io/ls1intum/edutelligence}/logos:${IMAGE_TAG:-latest}
    container_name: logos-orchestrator
    restart: unless-stopped
    # The single uvicorn worker holds one open fd per in-flight client stream
    # plus DB/worker-websocket fds. The default soft nofile limit (1024) means
    # that under load (~1000 concurrent streams) accept() hits EMFILE, the
    # orchestrator stops accepting connections, and Traefik returns 502 for
    # everything. Raise the soft limit to the host hard max so overload degrades
    # to slow (requests queue in the scheduler) instead of a 502 cascade.
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      logos-db:
        condition: service_healthy
    volumes:
      - data_volume:/src/logos
    environment:
      LOGOS_DOMAIN: "${LOGOS_DOMAIN:-localhost}"
      LOGOS_CAPACITY_PLANNER_ENABLED: "${LOGOS_CAPACITY_PLANNER_ENABLED:-true}"
      # Global request-lifecycle timeout knob. When set (>0) it overrides the
      # scheduler queue-wait, execution-context resolve, and worker stream
      # timeouts so a request effectively never times out (benchmark uses
      # 86400 to isolate scheduling from timeout-induced failures). Empty =
      # each stage keeps its own default (prod behaviour unchanged).
      LOGOS_TIMEOUT_S: "${LOGOS_TIMEOUT_S:-}"
      # Nightly calibration maintenance window (CalibrationOrchestrator). Set
      # LOGOS_CALIB_ENABLED=false to suppress it — the benchmark turns it off
      # for the duration of a run so a window session can't fire mid-benchmark.
      LOGOS_CALIB_ENABLED: "${LOGOS_CALIB_ENABLED:-true}"
      LOGOS_CALIB_WINDOW_START: "${LOGOS_CALIB_WINDOW_START:-03:00}"
      LOGOS_CALIB_WINDOW_END: "${LOGOS_CALIB_WINDOW_END:-08:00}"
      # How long the orchestrator waits for a worker to produce the next stream
      # chunk before closing the connection ("Stream timeout waiting for worker
      # response" → client sees RemoteProtocolError). The default 120s is too
      # short under model thrashing: a request for a not-yet-loaded model must
      # wait for the demand-preemptive drain to swap a busy lane AND the big
      # model to load (can exceed 120s), so it timed out before being served.
      LOGOSNODE_INFER_TIMEOUT_SECONDS: "${LOGOSNODE_INFER_TIMEOUT_SECONDS:-600}"
      LOGOSNODE_STREAM_TIMEOUT_SECONDS: "${LOGOSNODE_STREAM_TIMEOUT_SECONDS:-600}"
      LOGOS_NODE_DEV_ALLOW_INSECURE_HTTP: "${LOGOS_NODE_DEV_ALLOW_INSECURE_HTTP:-}"
      PROMETHEUS_API_KEY: "${PROMETHEUS_API_KEY:-}"
      LOGOS_INTERNAL_SECRET: "${LOGOS_INTERNAL_SECRET:-}"
      TZ: "${TZ:-Europe/Berlin}"
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"

      # ── User-facing routes (ports 443 + 8080) ──

      # === Routing: /v1 ===
      - "traefik.http.routers.logos-orchestrator-v1.rule=PathPrefix(`/v1`)"
      - "traefik.http.routers.logos-orchestrator-v1.entrypoints=websecure,secure8080"
      - "traefik.http.routers.logos-orchestrator-v1.tls=true"
      - "traefik.http.routers.logos-orchestrator-v1.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-orchestrator-v1.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-v1.priority=100"

      # === Routing: /openai ===
      - "traefik.http.routers.logos-orchestrator-openai.rule=PathPrefix(`/openai`)"
      - "traefik.http.routers.logos-orchestrator-openai.entrypoints=websecure,secure8\
        080"
      - "traefik.http.routers.logos-orchestrator-openai.tls=true"
      - "traefik.http.routers.logos-orchestrator-openai.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-orchestrator-openai.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-openai.priority=100"

      # === Routing: /jobs ===
      - "traefik.http.routers.logos-orchestrator-jobs.rule=PathPrefix(`/jobs`)"
      - "traefik.http.routers.logos-orchestrator-jobs.entrypoints=websecure,secure8080"
      - "traefik.http.routers.logos-orchestrator-jobs.tls=true"
      - "traefik.http.routers.logos-orchestrator-jobs.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-orchestrator-jobs.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-jobs.priority=100"

      # === Routing: /health ===
      - "traefik.http.routers.logos-orchestrator-health.rule=PathPrefix(`/health`)"
      - "traefik.http.routers.logos-orchestrator-health.entrypoints=websecure,secure8080"
      - "traefik.http.routers.logos-orchestrator-health.tls=true"
      - "traefik.http.routers.logos-orchestrator-health.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-orchestrator-health.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-health.priority=100"

      # ── Admin routes (port 9443) ──

      # === Routing: /api (all UI-internal endpoints) ===
      # Backend strips the `/api` prefix, so adding a new admin endpoint
      # requires no change here — just a new FastAPI route under any path.
      - "traefik.http.routers.logos-orchestrator-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.logos-orchestrator-api.entrypoints=admin"
      - "traefik.http.routers.logos-orchestrator-api.tls=true"
      - "traefik.http.routers.logos-orchestrator-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-orchestrator-api.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-api.priority=100"

      # === Routing: /logosdb/providers/logosnode (workernode protocol) ===
      - "traefik.http.routers.logos-orchestrator-logosnode.rule=PathPrefix(`/logosdb/p\
        roviders/logosnode`)"
      - "traefik.http.routers.logos-orchestrator-logosnode.entrypoints=admin"
      - "traefik.http.routers.logos-orchestrator-logosnode.tls=true"
      - "traefik.http.routers.logos-orchestrator-logosnode.tls.certresolver=letsencry\
        pt"
      - "traefik.http.routers.logos-orchestrator-logosnode.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-logosnode.priority=100"

      # === Routing: /docs ===
      - "traefik.http.routers.logos-orchestrator-docs.rule=PathPrefix(`/docs`) ||
        PathPrefix(`/openapi.json`)"
      - "traefik.http.routers.logos-orchestrator-docs.entrypoints=admin"
      - "traefik.http.routers.logos-orchestrator-docs.tls=true"
      - "traefik.http.routers.logos-orchestrator-docs.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-orchestrator-docs.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-docs.priority=100"

      # === Routing: /metrics (Prometheus) ===
      - "traefik.http.routers.logos-orchestrator-metrics.rule=PathPrefix(`/metrics`)"
      - "traefik.http.routers.logos-orchestrator-metrics.entrypoints=admin"
      - "traefik.http.routers.logos-orchestrator-metrics.tls=true"
      - "traefik.http.routers.logos-orchestrator-metrics.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-orchestrator-metrics.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-metrics.priority=100"

      # === Routing: /api/logosdb/scheduler_state ===
      - "traefik.http.routers.logos-orchestrator-scheduler-state.rule=Path(`/api/logosdb/scheduler_state`)"
      - "traefik.http.routers.logos-orchestrator-scheduler-state.entrypoints=admin"
      - "traefik.http.routers.logos-orchestrator-scheduler-state.tls=true"
      - "traefik.http.routers.logos-orchestrator-scheduler-state.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-orchestrator-scheduler-state.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-scheduler-state.middlewares=strip-api"
      - "traefik.http.routers.logos-orchestrator-scheduler-state.priority=201"

      # === Routing: /api/logosdb/providers/logosnode (UI → worker admin actions) ===
      # Must outrank the webservice's /api/logosdb catch-all (priority 200):
      # calibrate_uncalibrated/status/lanes/etc. live in the orchestrator,
      # which holds the worker registry — the webservice would 404 them.
      - "traefik.http.routers.logos-orchestrator-api-logosnode.rule=PathPrefix(`/api/logosdb/providers/logosnode`)"
      - "traefik.http.routers.logos-orchestrator-api-logosnode.entrypoints=admin"
      - "traefik.http.routers.logos-orchestrator-api-logosnode.tls=true"
      - "traefik.http.routers.logos-orchestrator-api-logosnode.tls.certresolver=letsencrypt"
      - "traefik.http.routers.logos-orchestrator-api-logosnode.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-api-logosnode.middlewares=strip-api"
      - "traefik.http.routers.logos-orchestrator-api-logosnode.priority=201"

      # Service-Port
      - "traefik.http.services.logos-orchestrator.loadbalancer.server.port=8080"
    networks:
      - internal

  logos-webservice:
    image: ${REGISTRY:-ghcr.io/ls1intum/edutelligence}/logos-webservice:${IMAGE_TAG:-latest}
    container_name: logos-webservice
    restart: unless-stopped
    depends_on:
      logos-db:
        condition: service_healthy
    environment:
      DB_HOST: logos-db
      DB_PORT: 5432
      DB_NAME: logosdb
      DB_USER: postgres
      DB_PASSWORD: root
      LOGOS_ORCHESTRATOR_URL: "http://logos-orchestrator:8080"
      LOGOS_INTERNAL_SECRET: "${LOGOS_INTERNAL_SECRET:-}"
      JDK_JAVA_OPTIONS: "-XX:MaxRAMPercentage=80.0"
      # Keycloak (also served back to the UI via /api/info)
      KEYCLOAK_ISSUER_URI: "${KEYCLOAK_ISSUER_URI:?KEYCLOAK_ISSUER_URI must be set}"
      KEYCLOAK_JWKS_URI: "${KEYCLOAK_JWKS_URI:-${KEYCLOAK_ISSUER_URI}/protocol/openid-connect/certs}"
      KEYCLOAK_ADMIN_BASE_URL: "${KEYCLOAK_ADMIN_BASE_URL:-}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM:-tum}"
      KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID:-logos}"
      # Passkey WebAuthn Relying Party ID, served to the UI via /info. On the shared
      # TUM Keycloak passkeys are scoped to the parent domain, so default to it
      # rather than the full UI host (else the browser finds no matching passkey).
      KEYCLOAK_PASSKEY_RP_ID: "${KEYCLOAK_PASSKEY_RP_ID:-aet.cit.tum.de}"
      KEYCLOAK_PASSKEY_RP_NAME: "${KEYCLOAK_PASSKEY_RP_NAME:-Logos}"
      # Empty default: KeycloakProperties auto-derives audience from client id.
      KEYCLOAK_AUDIENCE: "${KEYCLOAK_AUDIENCE:-}"
      KEYCLOAK_ROLES_LOGOS_ADMIN: "${KEYCLOAK_ROLES_LOGOS_ADMIN:-itg-admin}"
      KEYCLOAK_ROLES_APP_ADMIN: "${KEYCLOAK_ROLES_APP_ADMIN:-chair-member}"
      KEYCLOAK_AUTO_PROVISION_TEAMS: "${KEYCLOAK_AUTO_PROVISION_TEAMS:-false}"
      KEYCLOAK_TEAM_ROLE_SUFFIXES: "${KEYCLOAK_TEAM_ROLE_SUFFIXES:--dev,-team,-group}"
      KEYCLOAK_SYNC_ENABLED: "${KEYCLOAK_SYNC_ENABLED:-false}"
      KEYCLOAK_SYNC_CLIENT_ID: "${KEYCLOAK_SYNC_CLIENT_ID:-logos-sync}"
      KEYCLOAK_SYNC_CLIENT_SECRET: "${KEYCLOAK_SYNC_CLIENT_SECRET:-}"
      # Origins the webservice accepts browser requests from. Browsers attach an
      # Origin header to POST requests and WebSocket handshakes even when the UI
      # and API share an origin, so the Spring CorsFilter rejects every POST/WS
      # (get_models, get_providers, paginated_requests, billing, /ws/stats, …)
      # if this is empty — while same-origin GETs (/me, /users) slip through. The
      # UI is served on the admin entrypoint, so default to that exact origin.
      LOGOS_CORS_ALLOWED_ORIGINS: "${LOGOS_CORS_ALLOWED_ORIGINS:-https://${LOGOS_DOMAIN:-localhost}:${LOGOS_TRAEFIK_ADMIN_PORT:-9443}}"
    expose:
      - "8081"
    labels:
      - "traefik.enable=true"
      # strip-api middleware is defined on the Traefik container (see above).

      # === Routing: /api/me, /api/users, /api/teams, /api/info ===
      - "traefik.http.routers.webservice-identity.rule=PathPrefix(`/api/me`) || PathPrefix(`/api/users`) || PathPrefix(`/api/teams`) || Path(`/api/info`)"
      - "traefik.http.routers.webservice-identity.entrypoints=admin"
      - "traefik.http.routers.webservice-identity.tls=true"
      - "traefik.http.routers.webservice-identity.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webservice-identity.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-identity.middlewares=strip-api"
      - "traefik.http.routers.webservice-identity.priority=200"

      # === Routing: /api/logosdb ===
      - "traefik.http.routers.webservice-config.rule=PathPrefix(`/api/logosdb`)"
      - "traefik.http.routers.webservice-config.entrypoints=admin"
      - "traefik.http.routers.webservice-config.tls=true"
      - "traefik.http.routers.webservice-config.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webservice-config.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-config.middlewares=strip-api"
      - "traefik.http.routers.webservice-config.priority=200"

      # === Routing: /api/logosdb/providers/logosnode/calibrate_uncalibrated and /lanes/delete ===
      # These two admin actions require JWT auth, so they go through Spring (priority 202 beats
      # the orchestrator's logosnode catch-all at 201). Spring validates the token and proxies
      # to the orchestrator via internal secret.
      - "traefik.http.routers.webservice-logosnode-admin.rule=Path(`/api/logosdb/providers/logosnode/calibrate_uncalibrated`) || Path(`/api/logosdb/providers/logosnode/lanes/delete`)"
      - "traefik.http.routers.webservice-logosnode-admin.entrypoints=admin"
      - "traefik.http.routers.webservice-logosnode-admin.tls=true"
      - "traefik.http.routers.webservice-logosnode-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webservice-logosnode-admin.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-logosnode-admin.middlewares=strip-api"
      - "traefik.http.routers.webservice-logosnode-admin.priority=202"

      # === Routing: /api/admin ===
      - "traefik.http.routers.webservice-admin.rule=PathPrefix(`/api/admin`)"
      - "traefik.http.routers.webservice-admin.entrypoints=admin"
      - "traefik.http.routers.webservice-admin.tls=true"
      - "traefik.http.routers.webservice-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webservice-admin.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-admin.middlewares=strip-api"
      - "traefik.http.routers.webservice-admin.priority=200"

      # === Routing: /api/ws/stats, /api/ws/stats/v2 (WebSocket) ===
      - "traefik.http.routers.webservice-ws.rule=Path(`/api/ws/stats`) || Path(`/api/ws/stats/v2`)"
      - "traefik.http.routers.webservice-ws.entrypoints=admin"
      - "traefik.http.routers.webservice-ws.tls=true"
      - "traefik.http.routers.webservice-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webservice-ws.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-ws.middlewares=strip-api"
      - "traefik.http.routers.webservice-ws.priority=200"

      # Service-Port
      - "traefik.http.services.logos-webservice-svc.loadbalancer.server.port=8081"
    networks:
      - internal

  logos-db:
    image: ${REGISTRY:-ghcr.io/ls1intum/edutelligence}/logos-db:${IMAGE_TAG:-latest}
    container_name: logos-db
    restart: unless-stopped
    user: postgres
    command: >
      postgres -c shared_preload_libraries=pg_cron -c cron.database_name=logosdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: logosdb
      POSTGRES_HOST: localhost
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "--username=postgres" ]
      interval: 1s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  logos-ui:
    image: ${REGISTRY:-ghcr.io/ls1intum/edutelligence}/logos-ui:${IMAGE_TAG:-latest}
    container_name: logos-ui
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - "traefik.enable=true"

      # === UI routing (admin port only) ===
      # Override: set LOGOS_DOMAIN / LOGOS_CERT_RESOLVER in .env
      - "traefik.http.routers.internal-ui.rule=Host(`${LOGOS_DOMAIN:-localhost}\
        `) && PathPrefix(`/`)"
      - "traefik.http.routers.internal-ui.entrypoints=admin"
      - "traefik.http.routers.internal-ui.tls=true"
      - "traefik.http.routers.internal-ui.tls.certresolver=letsencrypt"
      - "traefik.http.routers.internal-ui.service=internal-ui-svc"
      - "traefik.http.routers.internal-ui.priority=0"

      # Shared service definition
      - "traefik.http.services.internal-ui-svc.loadbalancer.server.port=80"
    networks:
      - internal

volumes:
  data_volume:
  postgres_data:

networks:
  internal:
    driver: bridge
