# docker-compose.dev.yaml — Local development (plain HTTP, no TLS)
# Usage: docker compose -f docker-compose.dev.yaml up --build
#
# All services are reachable over plain HTTP on localhost.
# Production docker-compose.yaml is NOT affected.
#
# Ports:
#   18081  →  UI + API  (Traefik HTTP — main entry point)
#   18443  →  Landing page (Traefik HTTP)
#   18080  →  logos-orchestrator direct (bypass Traefik, handy for debugging)
#   5432   →  PostgreSQL
#
# Worker node: point LOGOS_URL=http://host.docker.internal:18080
#              with   LOGOS_ALLOW_INSECURE_HTTP=true

services:
  traefik:
    image: traefik:v3.6.1
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # HTTP-only entrypoints (no TLS)
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web8080.address=:8080"
      - "--api.dashboard=false"
    ports:
      - "${LOGOS_TRAEFIK_LANDING_PORT:-18443}:80" # landing page
      - "${LOGOS_TRAEFIK_UI_PORT:-18081}:8080" # UI + API
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
      - extern

  logos-orchestrator:
    build:
      context: ../
      dockerfile: ./logos/logos-orchestrator/Dockerfile
    container_name: logos-orchestrator
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "logos.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--ws-ping-interval",
        "60",
        "--ws-ping-timeout",
        "60",
      ]
    depends_on:
      logos-db:
        condition: service_healthy
    volumes:
      - data_volume:/src/logos
      - ./logos-orchestrator/src/logos/capacity:/app/src/logos/capacity:ro
      - ./logos-orchestrator/src/logos/pipeline:/app/src/logos/pipeline:ro
      - ./logos-orchestrator/src/logos/sdi:/app/src/logos/sdi:ro
      - ./logos-orchestrator/tests/performance/results:/app/tests/performance/results
      - ./logos-orchestrator/tests/integration:/app/tests/integration
    environment:
      LOGOS_DOMAIN: "${LOGOS_DOMAIN:-localhost}"
      LOGOS_SCHEDULER_ETTFT_ENABLED: "${LOGOS_SCHEDULER_ETTFT_ENABLED:-true}"
      LOGOS_CAPACITY_PLANNER_ENABLED: "${LOGOS_CAPACITY_PLANNER_ENABLED:-true}"
      ECCS_DECISION_LOG: "${ECCS_DECISION_LOG:-/tmp/eccs_decisions.jsonl}"
      LOGOS_NODE_DEV_ALLOW_INSECURE_HTTP: "true"
      LOGOSNODE_INFER_TIMEOUT_SECONDS: "1200"
      LOGOSNODE_STREAM_TIMEOUT_SECONDS: "1200"
      PROMETHEUS_API_KEY: "${PROMETHEUS_API_KEY:-}"
      LOGOS_INTERNAL_SECRET: "${LOGOS_INTERNAL_SECRET:-}"
    expose:
      - "8080"
    ports:
      - "18080:8080"
    labels:
      - "traefik.enable=true"

      # === Routing: /v1 ===
      - "traefik.http.routers.logos-orchestrator-v1.rule=PathPrefix(`/v1`)"
      - "traefik.http.routers.logos-orchestrator-v1.entrypoints=web8080"
      - "traefik.http.routers.logos-orchestrator-v1.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-v1.priority=100"

      # === Routing: /openai ===
      - "traefik.http.routers.logos-orchestrator-openai.rule=PathPrefix(`/openai`)"
      - "traefik.http.routers.logos-orchestrator-openai.entrypoints=web8080"
      - "traefik.http.routers.logos-orchestrator-openai.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-openai.priority=100"

      # === Routing: /jobs ===
      - "traefik.http.routers.logos-orchestrator-jobs.rule=PathPrefix(`/jobs`)"
      - "traefik.http.routers.logos-orchestrator-jobs.entrypoints=web8080"
      - "traefik.http.routers.logos-orchestrator-jobs.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-jobs.priority=100"

      # === Routing: /api (UI-internal endpoints; backend strips /api prefix) ===
      - "traefik.http.routers.logos-orchestrator-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.logos-orchestrator-api.entrypoints=web8080"
      - "traefik.http.routers.logos-orchestrator-api.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-api.priority=100"

      # === Routing: /docs ===
      - "traefik.http.routers.logos-orchestrator-docs.rule=PathPrefix(`/docs`) || PathPrefix(`/openapi.json`)"
      - "traefik.http.routers.logos-orchestrator-docs.entrypoints=web8080"
      - "traefik.http.routers.logos-orchestrator-docs.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-docs.priority=100"

      # === Routing: /metrics (Prometheus) ===
      - "traefik.http.routers.logos-orchestrator-metrics.rule=PathPrefix(`/metrics`)"
      - "traefik.http.routers.logos-orchestrator-metrics.entrypoints=web8080"
      - "traefik.http.routers.logos-orchestrator-metrics.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-metrics.priority=100"

      # === Routing: /ws (WebSocket) ===
      - "traefik.http.routers.logos-orchestrator-ws.rule=PathPrefix(`/ws`)"
      - "traefik.http.routers.logos-orchestrator-ws.entrypoints=web8080"
      - "traefik.http.routers.logos-orchestrator-ws.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-ws.priority=100"

      # Service-Port
      - "traefik.http.services.logos-orchestrator.loadbalancer.server.port=8080"

      # === Routing: /api/logosdb/scheduler_state ===
      - "traefik.http.routers.logos-orchestrator-scheduler-state.rule=Path(`/api/logosdb/scheduler_state`)"
      - "traefik.http.routers.logos-orchestrator-scheduler-state.entrypoints=web8080"
      - "traefik.http.routers.logos-orchestrator-scheduler-state.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-scheduler-state.middlewares=strip-api"
      - "traefik.http.routers.logos-orchestrator-scheduler-state.priority=201"

      # === Routing: /api/logosdb/providers/logosnode (UI → worker admin actions) ===
      # Must outrank the webservice's /api/logosdb catch-all (priority 200):
      # calibrate_uncalibrated/status/lanes/etc. live in the orchestrator,
      # which holds the worker registry — the webservice would 404 them.
      - "traefik.http.routers.logos-orchestrator-api-logosnode.rule=PathPrefix(`/api/logosdb/providers/logosnode`)"
      - "traefik.http.routers.logos-orchestrator-api-logosnode.entrypoints=web8080"
      - "traefik.http.routers.logos-orchestrator-api-logosnode.service=logos-orchestrator"
      - "traefik.http.routers.logos-orchestrator-api-logosnode.middlewares=strip-api"
      - "traefik.http.routers.logos-orchestrator-api-logosnode.priority=201"
    networks:
      - internal

  logos-webservice:
    build:
      context: ./logos-webservice
      dockerfile: Dockerfile
    container_name: logos-webservice
    restart: unless-stopped
    depends_on:
      logos-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DB_HOST: logos-db
      DB_PORT: 5432
      DB_NAME: logosdb
      DB_USER: postgres
      DB_PASSWORD: root
      LOGOS_ORCHESTRATOR_URL: "http://logos-orchestrator:8080"
      LOGOS_INTERNAL_SECRET: "${LOGOS_INTERNAL_SECRET:-}"
      JDK_JAVA_OPTIONS: "-XX:MaxRAMPercentage=80.0"
      KEYCLOAK_ISSUER_URI: "${KEYCLOAK_ISSUER_URI:-http://localhost:8085/realms/tum}"
      KEYCLOAK_JWKS_URI: "${KEYCLOAK_JWKS_URI:-http://keycloak:8080/realms/tum/protocol/openid-connect/certs}"
      KEYCLOAK_ADMIN_BASE_URL: "${KEYCLOAK_ADMIN_BASE_URL:-http://keycloak:8080}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM:-tum}"
      KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID:-logos}"
      # Empty default: KeycloakProperties auto-derives audience from client id.
      KEYCLOAK_AUDIENCE: "${KEYCLOAK_AUDIENCE:-}"
      KEYCLOAK_ROLES_LOGOS_ADMIN: "${KEYCLOAK_ROLES_LOGOS_ADMIN:-itg-admin}"
      KEYCLOAK_ROLES_APP_ADMIN: "${KEYCLOAK_ROLES_APP_ADMIN:-chair-member}"
      KEYCLOAK_AUTO_PROVISION_TEAMS: "${KEYCLOAK_AUTO_PROVISION_TEAMS:-false}"
      KEYCLOAK_TEAM_ROLE_SUFFIXES: "${KEYCLOAK_TEAM_ROLE_SUFFIXES:--dev,-team,-group}"
      KEYCLOAK_SYNC_ENABLED: "${KEYCLOAK_SYNC_ENABLED:-false}"
      KEYCLOAK_SYNC_CLIENT_ID: "${KEYCLOAK_SYNC_CLIENT_ID:-logos-sync}"
      KEYCLOAK_SYNC_CLIENT_SECRET: "${KEYCLOAK_SYNC_CLIENT_SECRET:-}"
      # See prod docker-compose.yaml for why this must be set: browsers send an
      # Origin on POST/WebSocket even same-origin, so an empty allowlist makes the
      # CorsFilter reject every POST/WS. Default to the dev UI origin (Traefik UI
      # port over plain HTTP).
      LOGOS_CORS_ALLOWED_ORIGINS: "${LOGOS_CORS_ALLOWED_ORIGINS:-http://${LOGOS_DOMAIN:-localhost}:${LOGOS_TRAEFIK_UI_PORT:-18081}}"
    expose:
      - "8081"
    ports:
      - "18082:8081"
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"

      # === Routing: /api/me, /api/users, /api/teams, /api/info ===
      - "traefik.http.routers.webservice-identity.rule=PathPrefix(`/api/me`) || PathPrefix(`/api/users`) || PathPrefix(`/api/teams`) || Path(`/api/info`)"
      - "traefik.http.routers.webservice-identity.entrypoints=web8080"
      - "traefik.http.routers.webservice-identity.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-identity.middlewares=strip-api"
      - "traefik.http.routers.webservice-identity.priority=200"

      # === Routing: /api/logosdb ===
      - "traefik.http.routers.webservice-config.rule=PathPrefix(`/api/logosdb`)"
      - "traefik.http.routers.webservice-config.entrypoints=web8080"
      - "traefik.http.routers.webservice-config.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-config.middlewares=strip-api"
      - "traefik.http.routers.webservice-config.priority=200"

      # === Routing: /api/logosdb/providers/logosnode/calibrate_uncalibrated and /lanes/delete ===
      - "traefik.http.routers.webservice-logosnode-admin.rule=Path(`/api/logosdb/providers/logosnode/calibrate_uncalibrated`) || Path(`/api/logosdb/providers/logosnode/lanes/delete`)"
      - "traefik.http.routers.webservice-logosnode-admin.entrypoints=web8080"
      - "traefik.http.routers.webservice-logosnode-admin.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-logosnode-admin.middlewares=strip-api"
      - "traefik.http.routers.webservice-logosnode-admin.priority=202"

      # === Routing: /api/admin ===
      - "traefik.http.routers.webservice-admin.rule=PathPrefix(`/api/admin`)"
      - "traefik.http.routers.webservice-admin.entrypoints=web8080"
      - "traefik.http.routers.webservice-admin.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-admin.middlewares=strip-api"
      - "traefik.http.routers.webservice-admin.priority=200"

      # === Routing: /api/ws/stats, /api/ws/stats/v2 (WebSocket) ===
      - "traefik.http.routers.webservice-ws.rule=Path(`/api/ws/stats`) || Path(`/api/ws/stats/v2`)"
      - "traefik.http.routers.webservice-ws.entrypoints=web8080"
      - "traefik.http.routers.webservice-ws.service=logos-webservice-svc"
      - "traefik.http.routers.webservice-ws.middlewares=strip-api"
      - "traefik.http.routers.webservice-ws.priority=200"

      # Service-Port
      - "traefik.http.services.logos-webservice-svc.loadbalancer.server.port=8081"
    networks:
      - internal

  logos-db:
    build: ./db
    container_name: logos-db
    restart: unless-stopped
    user: postgres
    command: >
      postgres
      -c shared_preload_libraries=pg_cron
      -c cron.database_name=logosdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: logosdb
      POSTGRES_HOST: localhost
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "--username=postgres"]
      interval: 1s
      timeout: 5s
      retries: 10
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: logos-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm", "--health-enabled=true"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      # WARNING: default admin password — local dev only, MUST be changed before any deployment
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: "http://localhost:8085"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\": \"UP\"' <&3"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - internal

  logos-ui:
    build:
      context: ./logos-ui
    container_name: logos-ui
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - "traefik.enable=true"

      # === UI routing (HTTP, no TLS) ===
      - "traefik.http.routers.internal-ui.rule=Host(`${LOGOS_DOMAIN:-localhost}`) && PathPrefix(`/`)"
      - "traefik.http.routers.internal-ui.entrypoints=web8080"
      - "traefik.http.routers.internal-ui.service=internal-ui-svc"
      - "traefik.http.routers.internal-ui.priority=0"

      # Shared service definition
      - "traefik.http.services.internal-ui-svc.loadbalancer.server.port=80"
    networks:
      - internal

volumes:
  data_volume:
  postgres_data:

networks:
  internal:
    driver: bridge
  extern:
    driver: bridge
