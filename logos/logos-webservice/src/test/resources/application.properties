spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.enabled=false
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8085/realms/tum
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8085/realms/tum/protocol/openid-connect/certs
logos.auth.client-id=logos
