spring.application.name=logos-webservice
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:logosdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.liquibase.change-log=classpath:liquibase/changelog/master.xml
server.port=8081
logos.orchestrator.url=${LOGOS_ORCHESTRATOR_URL:}
logos.orchestrator.internal-secret=${LOGOS_INTERNAL_SECRET:}

# --- Keycloak / OAuth2 resource server ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8085/realms/tum}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI:http://localhost:8085/realms/tum/protocol/openid-connect/certs}

# Comma-separated origins allowed for browser cross-origin calls (Expo dev server, etc.)
logos.cors.allowed-origins=${LOGOS_CORS_ALLOWED_ORIGINS:*}

# --- Logos auth: claim → role/team mapping & sync ---
logos.auth.client-id=${KEYCLOAK_CLIENT_ID:logos}
# Expected token audience (defaults to the client id). Tokens minted for another client on the
# same realm are rejected. Leave matching the client id unless an explicit aud mapper is used.
logos.auth.audience=${KEYCLOAK_AUDIENCE:logos}
logos.auth.roles.logos-admin=${KEYCLOAK_ROLES_LOGOS_ADMIN:itg-admin}
logos.auth.roles.app-admin=${KEYCLOAK_ROLES_APP_ADMIN:chair-member}
# Auto-create teams from suffix-matching Keycloak roles/groups. Off by default: a claim only maps
# to a team an admin already linked via teams.keycloak_group, so users cannot self-provision teams.
logos.auth.auto-provision-teams=${KEYCLOAK_AUTO_PROVISION_TEAMS:false}
# Role-name suffixes that mark a Keycloak role as a team (comma-separated). Roles not
# ending in one of these are ignored for team provisioning (keeps offline_access etc. out).
logos.auth.team-role-suffixes=${KEYCLOAK_TEAM_ROLE_SUFFIXES:-dev,-team,-group}
logos.auth.sync-debounce-minutes=${KEYCLOAK_SYNC_DEBOUNCE_MINUTES:5}
logos.auth.sync.enabled=${KEYCLOAK_SYNC_ENABLED:false}
logos.auth.sync.cron=${KEYCLOAK_SYNC_CRON:0 0 * * * *}
logos.auth.sync.admin-base-url=${KEYCLOAK_ADMIN_BASE_URL:http://localhost:8085}
logos.auth.sync.realm=${KEYCLOAK_REALM:tum}
logos.auth.sync.client-id=${KEYCLOAK_SYNC_CLIENT_ID:logos-sync}
logos.auth.sync.client-secret=${KEYCLOAK_SYNC_CLIENT_SECRET:}
