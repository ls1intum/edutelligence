services:
  logos-workernode:
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-utility,compute}
      CUDA_HOME: ${CUDA_HOME:-/usr/local/cuda-12.8} # Please adjust if your CUDA installation is in a different location
    gpus: all
    pid: host
    ipc: host              # Required for NCCL shared-memory transport in tensor-parallel vLLM
    shm_size: "16g"        # Default 64 MB is insufficient; NCCL hangs without adequate /dev/shm
    volumes:
      - ${CUDA_HOME:-/usr/local/cuda-12.8}:${CUDA_HOME:-/usr/local/cuda-12.8}:ro # Please adjust if your CUDA installation is in a different location
