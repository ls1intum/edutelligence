# docker-compose.dev.yml — Local development (builds worker node from source)
# Usage: docker compose -f docker-compose.dev.yml up --build
#
# CPU/Ollama build (default):
#   INSTALL_VLLM=0  INSTALL_OLLAMA=1  PYTHON_IMAGE=python:3.12-slim
#
# GPU/vLLM build:
#   INSTALL_VLLM=1  INSTALL_OLLAMA=0
#   BASE_IMAGE=nvidia/cuda:13.2.0-cudnn-devel-ubuntu24.04
#   RUNTIME_IMAGE=nvidia/cuda:13.2.0-cudnn-runtime-ubuntu24.04
services:
  logos-workernode:
    build:
      context: .
      args:
        BASE_IMAGE: ${BASE_IMAGE:-${PYTHON_IMAGE:-python:3.12-slim}}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-${BASE_IMAGE:-${PYTHON_IMAGE:-python:3.12-slim}}}
        INSTALL_OLLAMA: ${INSTALL_OLLAMA:-1}
        INSTALL_VLLM: ${INSTALL_VLLM:-0}
        VLLM_PIP_SPEC: ${VLLM_PIP_SPEC:-vllm}
        NCCL_PIP_SPEC: ${NCCL_PIP_SPEC:-}
    container_name: logos-workernode
    init: true
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 2m
    environment:
      LOGOS_URL: ${LOGOS_URL:-}
      LOGOS_API_KEY: ${LOGOS_API_KEY:-}
      LOGOS_ALLOW_INSECURE_HTTP: ${LOGOS_ALLOW_INSECURE_HTTP:-}
      # Set to "1" to skip auto-calibration on startup
      LOGOS_SKIP_AUTO_CALIBRATION: ${LOGOS_SKIP_AUTO_CALIBRATION:-}
      WORKER_PORT: ${WORKER_PORT:-80}
      LOGOS_WORKER_NODE_CONFIG: /app/config.yml
      LOGOS_STATE_DIR: /app/data
      HF_HOME: /usr/share/ollama/.ollama/models/.hf_cache
      # ── GPU / CUDA (only relevant when INSTALL_VLLM=1) ───────────────────
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-utility,compute}
    gpus: all
    pid: host
    ipc: host # Required for NCCL shared-memory transport in tensor-parallel vLLM
    shm_size: "16g" # Default 64 MB is insufficient; NCCL hangs without adequate /dev/shm
    ulimits:
      memlock:
        soft: -1
        hard: -1 # Unlimited locked memory — needed for NCCL pinned buffers
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${WORKER_PORT:-80}:${WORKER_PORT:-80}"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data
      - ${OLLAMA_MODELS_MOUNT:-ollama-models}:/usr/share/ollama/.ollama/models
      - ./certs:/app/certs:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,socket; s=socket.create_connection(('127.0.0.1',int(os.environ.get('WORKER_PORT',80))),2); s.close()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ollama-models:
