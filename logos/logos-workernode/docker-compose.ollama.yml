# docker-compose.ollama.yml — Ollama worker node (pulls pre-built image from GHCR)
# Usage: docker compose -f docker-compose.ollama.yml up
services:
  logos-workernode:
    image: ghcr.io/ls1intum/edutelligence/logos-workernode-ollama:${IMAGE_TAG:-latest}
    container_name: logos-workernode
    init: true
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 2m
    environment:
      LOGOS_URL: ${LOGOS_URL:-}
      LOGOS_API_KEY: ${LOGOS_API_KEY:-}
      LOGOS_ALLOW_INSECURE_HTTP: ${LOGOS_ALLOW_INSECURE_HTTP:-}
      WORKER_PORT: ${WORKER_PORT:-80}
      LOGOS_WORKER_NODE_CONFIG: /app/config.yml
      LOGOS_STATE_DIR: /app/data
      HF_HOME: /usr/share/ollama/.ollama/models/.hf_cache
    ports:
      - "127.0.0.1:${WORKER_PORT:-80}:${WORKER_PORT:-80}"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - worker-state:/app/data
      - ${OLLAMA_MODELS_MOUNT:-ollama-models}:/usr/share/ollama/.ollama/models
      - ./certs:/app/certs:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,socket; s=socket.create_connection(('127.0.0.1',int(os.environ.get('WORKER_PORT',80))),2); s.close()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  worker-state:
  ollama-models:
