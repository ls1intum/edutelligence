# config.yml — Hardware & tuning settings (managed by Ansible)
#
# Credentials are NOT in this file.
# They come from .env (GitHub secrets): LOGOS_URL, LOGOS_API_KEY
# The server resolves provider identity from the API key.

worker:
  gpu_poll_interval: 5
  lane_port_start: 11436
  lane_port_end: 11499

logos:
  enabled: true
  capabilities_models:
    - model: Qwen/Qwen2.5-Coder-7B-Instruct-AWQ
      tensor_parallel_size: 2
      kv_cache_memory_bytes: 4G
    - model: Qwen/Qwen2.5-Coder-14B-Instruct-AWQ
      tensor_parallel_size: 2
      kv_cache_memory_bytes: 4G
    - model: solidrust/Mistral-7B-Instruct-v0.3-AWQ
      tensor_parallel_size: 2
      kv_cache_memory_bytes: 4G
    # cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit — vLLM image (pr-489) lacks gemma4 arch support; needs newer transformers
    # openai/gpt-oss-20b requires MXFP4 (SM 8.0+ / Ampere+), incompatible with Quadro RTX 5000 (SM 7.5)
  heartbeat_interval_seconds: 5
  reconnect_backoff_seconds: 3

engines:
  vllm:
    metrics_path: /metrics
    metrics_timeout_seconds: 5
    flashinfer_loglevel: 0
    flashinfer_logdest: stderr
    nccl_debug: WARN
    nccl_debug_subsys: INIT
    # Turing (SM 7.5) workaround for AWQ + TP=2 on Quadro RTX 5000:
    # force AWQ path, disable vLLM custom all-reduce kernels (PCIe, no NVLink),
    # disable NCCL P2P transfers, and run in eager mode for SM 7.5 stability.
    model_overrides:
      Qwen/Qwen2.5-Coder-7B-Instruct-AWQ:
        quantization: awq
        enforce_eager: true
        disable_custom_all_reduce: true
        disable_nccl_p2p: true
        gpu_memory_utilization: 0.85
      Qwen/Qwen2.5-Coder-14B-Instruct-AWQ:
        quantization: awq
        enforce_eager: true
        disable_custom_all_reduce: true
        disable_nccl_p2p: true
        gpu_memory_utilization: 0.85
      solidrust/Mistral-7B-Instruct-v0.3-AWQ:
        quantization: awq
        enforce_eager: true
        disable_custom_all_reduce: true
        disable_nccl_p2p: true
        gpu_memory_utilization: 0.85
