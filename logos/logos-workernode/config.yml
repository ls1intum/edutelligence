# config.yml — Hardware & tuning settings (managed by Ansible)
#
# Credentials are NOT in this file.
# They come from .env (GitHub secrets): LOGOS_URL, LOGOS_API_KEY
# The server resolves provider identity from the API key.

worker:
  gpu_poll_interval: 5
  lane_port_start: 11436
  lane_port_end: 11499

logos:
  enabled: true
  capabilities_models:
    - model: Qwen/Qwen2.5-Coder-7B-Instruct-AWQ
      tensor_parallel_size: 2
      kv_cache_memory_bytes: 4G
    - model: Qwen/Qwen2.5-Coder-14B-Instruct-AWQ
      tensor_parallel_size: 2
      kv_cache_memory_bytes: 4G
    - model: solidrust/Mistral-7B-Instruct-v0.3-AWQ
      tensor_parallel_size: 2
      kv_cache_memory_bytes: 4G
    - model: casperhansen/deepseek-r1-distill-llama-8b-awq
      tensor_parallel_size: 2
      kv_cache_memory_bytes: 4G
    - model: Alibaba-NLP/gte-Qwen2-1.5B-instruct
      tensor_parallel_size: 2
      kv_cache_memory_bytes: 2G
    # cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit: DISABLED on SM 7.5 (Turing).
    # head_dim=256/512 requires 96KB shared memory for attention kernels;
    # SM 7.5 has 64KB max. Needs Ampere+ (SM 8.0+, 100KB shared mem).
    # openai/gpt-oss-20b requires MXFP4 (SM 8.0+ / Ampere+), incompatible with Quadro RTX 5000 (SM 7.5)
  heartbeat_interval_seconds: 5
  reconnect_backoff_seconds: 3

engines:
  vllm:
    metrics_path: /metrics
    metrics_timeout_seconds: 5
    flashinfer_loglevel: 0
    flashinfer_logdest: stderr
    nccl_debug: WARN
    nccl_debug_subsys: INIT
    # Node-wide kill switch for vLLM sleep mode. When omitted or false,
    # individual lanes/models keep their default behaviour (the Logos
    # server enables sleep_mode for capability-served lanes). When true,
    # every vLLM lane on this node is forced to enable_sleep_mode=false,
    # overriding both per-model overrides below and the server's request.
    # The Logos server is informed via sleep_state="unsupported" on each
    # lane and via sleep_mode_disabled in WorkerRuntimeStatus, so the
    # planner falls back to stop/start for VRAM reclamation here.
    disable_sleep_mode: false
    # Sharded-checkpoint loading for tensor-parallel (TP>1) lanes. With TP>1
    # every vLLM rank otherwise reads the whole checkpoint and slices out its
    # shard, so cold-start load time grows with TP. When enabled, the worker
    # pre-converts the model to a sharded_state checkpoint (each rank reads
    # only its own shard → load time roughly constant in TP) and serves it
    # with --load-format sharded_state. Conversion runs right after calibration
    # when the calibrated TP is >1, or lazily before a TP>1 lane is spawned if
    # not yet converted. Checkpoints live under
    # <cache_root>/.sharded_cache/<model>/tp<N>/.
    sharded_checkpoint_enabled: true
    # Allow the lazy, spawn-time fallback conversion (set false to only use
    # checkpoints converted by the post-calibration trigger, so a lane spawn
    # never blocks on a conversion).
    sharded_checkpoint_convert_on_spawn: true
    # Turing (SM 7.5) workaround for AWQ + TP=2 on Quadro RTX 5000:
    # force AWQ path, disable vLLM custom all-reduce kernels (PCIe, no NVLink),
    # disable NCCL P2P transfers, and run in eager mode for SM 7.5 stability.
    # gpu_memory_utilization=0.10: effectively disabled.  We set
    # kv_cache_memory_bytes explicitly for every model so vLLM never
    # allocates a percentage of total GPU.  Actual VRAM is controlled by
    # base_residency + kv_cache_memory_bytes, validated by the planner.
    model_overrides:
      Qwen/Qwen2.5-Coder-7B-Instruct-AWQ:
        quantization: awq
        enforce_eager: true
        disable_custom_all_reduce: true
        disable_nccl_p2p: true
        gpu_memory_utilization: 0.10
      Qwen/Qwen2.5-Coder-14B-Instruct-AWQ:
        quantization: awq
        enforce_eager: true
        disable_custom_all_reduce: true
        disable_nccl_p2p: true
        gpu_memory_utilization: 0.10
      solidrust/Mistral-7B-Instruct-v0.3-AWQ:
        quantization: awq
        enforce_eager: true
        disable_custom_all_reduce: true
        disable_nccl_p2p: true
        gpu_memory_utilization: 0.10
      casperhansen/deepseek-r1-distill-llama-8b-awq:
        quantization: awq
        enforce_eager: true
        disable_custom_all_reduce: true
        disable_nccl_p2p: true
        gpu_memory_utilization: 0.10
        max_model_len: 8192
      Alibaba-NLP/gte-Qwen2-1.5B-instruct:
        # Embedding model — no quantization (native fp16, only 1.5B params)
        enforce_eager: true
        disable_custom_all_reduce: true
        disable_nccl_p2p: true
        gpu_memory_utilization: 0.10
        enable_prefix_caching: false
        extra_args:
          - "--runner"
          - "pooling"
      # cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit: DISABLED — see capabilities_models comment above
