# docker-compose.yml — Production GPU worker node (pulls pre-built vLLM image from GHCR)
# For local development, use: docker compose -f docker-compose.dev.yml up --build
#
# Config split:
#   config.yml  — hardware & tuning (Ansible-managed, mounted read-only)
#   .env        — identity & credentials (GitHub secrets/variables)
#   ./data      — runtime state (bind-mounted, visible on host)
#
# tmpfs RAM cache (optional):
#   Set LOGOS_TMPFS_CACHE_PATH=/mnt/ramcache and TMPFS_SIZE=100g in .env
#   to enable a tmpfs-backed RAM cache for faster model loading.
#   When TMPFS_SIZE is unset or "0", the tmpfs mount is a no-op (size=0).
services:
  logos-workernode:
    image: ghcr.io/ls1intum/edutelligence/logos-workernode-vllm:${IMAGE_TAG:-latest}
    container_name: logos-workernode
    init: true
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 2m
    environment:
      # ── From .env (GitHub secrets/variables) ───────────────────────────
      LOGOS_URL: ${LOGOS_URL:-}
      LOGOS_API_KEY: ${LOGOS_API_KEY:-}
      LOGOS_ALLOW_INSECURE_HTTP: ${LOGOS_ALLOW_INSECURE_HTTP:-}
      HF_TOKEN: ${HF_TOKEN:-}
      MAX_LANES: ${MAX_LANES:-}
      # ── tmpfs RAM cache ────────────────────────────────────────────────
      LOGOS_TMPFS_CACHE_PATH: ${LOGOS_TMPFS_CACHE_PATH:-}
      # ── Auto-calibration ───────────────────────────────────────────────
      # Set to "1" to skip auto-calibration on startup (use manual calibrate.sh instead)
      LOGOS_SKIP_AUTO_CALIBRATION: ${LOGOS_SKIP_AUTO_CALIBRATION:-}
      # ── Fixed container paths ──────────────────────────────────────────
      LOGOS_WORKER_NODE_CONFIG: /app/config.yml
      LOGOS_STATE_DIR: /app/data
      HF_HOME: /usr/share/ollama/.ollama/models/.hf_cache
      # ── GPU / CUDA ────────────────────────────────────────────────────
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-utility,compute}
    gpus: all
    pid: host
    ipc: host # Required for NCCL shared-memory transport in tensor-parallel vLLM
    shm_size: "16g" # Default 64 MB is insufficient; NCCL hangs without adequate /dev/shm
    ulimits:
      memlock:
        soft: -1
        hard: -1 # Unlimited locked memory — needed for NCCL pinned buffers
    ports:
      - "127.0.0.1:${WORKER_PORT:-80}:${WORKER_PORT:-80}"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data
      - ${OLLAMA_MODELS_MOUNT:-ollama-models}:/usr/share/ollama/.ollama/models
      - ./certs:/app/certs:ro
      # tmpfs RAM cache — size=0 when TMPFS_SIZE is unset (no-op mount)
      - type: tmpfs
        target: /mnt/ramcache
        tmpfs:
          size: ${TMPFS_SIZE:-0}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,socket; s=socket.create_connection(('127.0.0.1',int(os.environ.get('WORKER_PORT',80))),2); s.close()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── One-shot VRAM calibration ──────────────────────────────────────────────
  # Loads each capabilities model, measures real awake + sleeping VRAM, and
  # writes model_profiles.yml to the shared worker-state volume.
  # The worker reads these values on next startup — no estimation needed.
  #
  # Usage (worker must be stopped first):
  #   docker compose stop logos-workernode
  #   docker compose run --rm logos-workernode-calibrate
  #   docker compose up -d logos-workernode
  #
  # Or with a custom KV cache size (match what your lanes use in production):
  #   CALIBRATION_KV_CACHE=6G docker compose run --rm logos-workernode-calibrate
  logos-workernode-calibrate:
    image: ghcr.io/ls1intum/edutelligence/logos-workernode-vllm:${IMAGE_TAG:-latest}
    profiles: ["calibrate"]
    container_name: logos-workernode-calibrate
    init: true
    restart: "no"
    command: >
      python3 /app/tools/calibrate_vram_profiles.py
      --config /app/config.yml
      --state-dir /app/data
      --kv-cache-memory-bytes ${CALIBRATION_KV_CACHE:-4G}
    environment:
      LOGOS_WORKER_NODE_CONFIG: /app/config.yml
      LOGOS_STATE_DIR: /app/data
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /usr/share/ollama/.ollama/models/.hf_cache
      LOGOS_TMPFS_CACHE_PATH: ${LOGOS_TMPFS_CACHE_PATH:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-utility,compute}
    gpus: all
    pid: host
    ipc: host
    shm_size: "16g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data
      - ${OLLAMA_MODELS_MOUNT:-ollama-models}:/usr/share/ollama/.ollama/models
      - ./tools:/app/tools:ro
      - ./calibration_logs:/app/calibration_logs
      # tmpfs RAM cache for calibration — models load faster from RAM
      - type: tmpfs
        target: /mnt/ramcache
        tmpfs:
          size: ${TMPFS_SIZE:-0}

volumes:
  ollama-models:
