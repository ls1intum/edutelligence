---
name: Logos - Test

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "logos/**"
      - "shared/**"
      - ".github/workflows/logos_test.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "logos/**"
      - "shared/**"
      - ".github/workflows/logos_test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Link shared dependency
        run: ln -s ../shared logos/shared

      - name: Install Dependencies
        # Install the master logos package plus pytest-timeout, which the
        # worker-node tests use via --timeout=30 below.
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install .
          uv pip install "coverage[toml]" pytest-timeout
        working-directory: logos

      - name: Clean old coverage data
        run: |
          rm -f .coverage
          rm -f coverage.xml
        working-directory: logos

      - name: Run Tests
        run: |
          source .venv/bin/activate
          coverage run -m pytest
        working-directory: logos

      - name: Run worker-node Tests
        # The worker-node suite was previously a separate job, but on
        # GitHub-hosted runners it was reliably killed by
        # "##[error]The runner has received a shutdown signal" within
        # ~15 s of starting pytest, while this master Test job (same
        # workflow, same runner pool) completed fine. Running them as a
        # follow-up step on the master's already-known-good runner avoids
        # that flakiness entirely.
        #
        # test_model_cache.py and test_calibration.py spawn real rsync /
        # vLLM subprocesses against fixtures and behave like integration
        # tests; run them pre-merge locally instead.
        # --timeout=30 turns any individual test hang into a pytest-timeout
        # traceback rather than a SIGTERM mystery from the runner.
        run: |
          source ../.venv/bin/activate
          pytest -q --tb=short --timeout=30 \
            --ignore=tests/test_model_cache.py \
            --ignore=tests/test_calibration.py
        working-directory: logos/logos-workernode

      - name: Generate Coverage Report
        run: |
          source .venv/bin/activate
          coverage xml
        working-directory: logos

  test-ui-export:
    name: Test UI Static Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: logos/logos-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: logos/logos-ui

      - name: Export static web build
        run: npx expo export --platform web
        working-directory: logos/logos-ui
