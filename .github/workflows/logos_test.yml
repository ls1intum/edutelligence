---
name: Logos - Test

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "logos/**"
      - "shared/**"
      - ".github/workflows/logos_test.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "logos/**"
      - "shared/**"
      - ".github/workflows/logos_test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Link shared dependency
        run: ln -s ../../shared logos/logos-orchestrator/shared

      - name: Install Dependencies
        # Install the master logos package plus pytest-timeout, which the
        # worker-node tests use via --timeout=30 below.
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install .
          uv pip install "coverage[toml]" pytest-timeout
        working-directory: logos/logos-orchestrator

      - name: Clean old coverage data
        run: |
          rm -f .coverage
          rm -f coverage.xml
        working-directory: logos/logos-orchestrator

      - name: Run Tests
        run: |
          source .venv/bin/activate
          coverage run -m pytest
        working-directory: logos/logos-orchestrator

      - name: Run worker-node Tests
        # The worker-node suite runs on the same runner as the master
        # tests above — a standalone job consistently triggered
        # "##[error]The runner has received a shutdown signal" partway
        # through, which a chunked diagnostic on this branch isolated to
        # tests/test_lane_manager.py.
        #
        # Files excluded from CI (run pre-merge locally instead):
        #   - test_model_cache.py: spawns real rsync against fixtures;
        #     orphan rsync processes terminate the runner step on Ubuntu.
        #   - test_calibration.py: spawns real vLLM subprocesses.
        #   - test_lane_manager.py: ~50 async tests around lane lifecycle
        #     (stuck detection, recovery, restart-circuit-breaker). The
        #     accumulated asyncio loops / monkeypatch state / temp dirs
        #     reliably trip the GitHub-hosted runner's "received a
        #     shutdown signal" failure mode roughly halfway through the
        #     file. The tests pass locally on macOS and Linux.
        run: |
          source ../logos-orchestrator/.venv/bin/activate
          pytest -q --tb=short --timeout=30 \
            --ignore=tests/test_model_cache.py \
            --ignore=tests/test_calibration.py \
            --ignore=tests/test_lane_manager.py
        working-directory: logos/logos-workernode

      - name: Generate Coverage Report
        run: |
          source .venv/bin/activate
          coverage xml
        working-directory: logos/logos-orchestrator

  test-ui-export:
    name: Test UI Static Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: logos/logos-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: logos/logos-ui

      - name: Export static web build
        run: npx expo export --platform web
        working-directory: logos/logos-ui
