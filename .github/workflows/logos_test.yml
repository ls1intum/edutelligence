---
name: Logos - Test

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "logos/**"
      - "shared/**"
      - ".github/workflows/logos_test.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "logos/**"
      - "shared/**"
      - ".github/workflows/logos_test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Link shared dependency
        run: ln -s ../shared logos/shared

      - name: Install Dependencies
        # Install the master logos package plus pytest-timeout, which the
        # worker-node tests use via --timeout=30 below.
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install .
          uv pip install "coverage[toml]" pytest-timeout
        working-directory: logos

      - name: Clean old coverage data
        run: |
          rm -f .coverage
          rm -f coverage.xml
        working-directory: logos

      - name: Run Tests
        run: |
          source .venv/bin/activate
          coverage run -m pytest
        working-directory: logos

      - name: Run worker-node Tests (small files)
        # Diagnostic split: every previous attempt killed the runner with
        # "##[error]The runner has received a shutdown signal" partway
        # through the worker-node suite. Run the worker-node tests in
        # named chunks so the failing chunk identifies the culprit.
        # test_model_cache.py and test_calibration.py spawn real rsync /
        # vLLM subprocesses; they're integration-flavoured and run pre-merge.
        run: |
          source ../.venv/bin/activate
          pytest -q --tb=short --timeout=30 \
            tests/test_bench_lane_backends.py \
            tests/test_cache_planner.py \
            tests/test_flashinfer_warmup.py \
            tests/test_gpu.py \
            tests/test_host_ram.py
        working-directory: logos/logos-workernode

      - name: Run worker-node Tests (lane_manager)
        run: |
          source ../.venv/bin/activate
          pytest -q --tb=short --timeout=30 tests/test_lane_manager.py
        working-directory: logos/logos-workernode

      - name: Run worker-node Tests (models + lifecycle)
        run: |
          source ../.venv/bin/activate
          pytest -q --tb=short --timeout=30 \
            tests/test_lane_models.py \
            tests/test_logos_bridge.py \
            tests/test_main.py \
            tests/test_max_lanes.py
        working-directory: logos/logos-workernode

      - name: Run worker-node Tests (profiles + runtime)
        run: |
          source ../.venv/bin/activate
          pytest -q --tb=short --timeout=30 \
            tests/test_model_profiles.py \
            tests/test_runtime.py \
            tests/test_static_lanes.py \
            tests/test_vllm_process.py
        working-directory: logos/logos-workernode

      - name: Generate Coverage Report
        run: |
          source .venv/bin/activate
          coverage xml
        working-directory: logos

  test-ui-export:
    name: Test UI Static Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: logos/logos-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: logos/logos-ui

      - name: Export static web build
        run: npx expo export --platform web
        working-directory: logos/logos-ui
