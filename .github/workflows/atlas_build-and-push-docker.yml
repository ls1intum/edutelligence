name: AtlasML - Build Docker Images

on:
  push:
    paths:
      - 'atlas/**'
      - '.github/workflows/atlas_build-and-push-docker.yml'
  release:
    types:
      - published

jobs:
  compute-tag:
    name: Compute tag
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.compute-tag.outputs.result }}
      is_release: ${{ steps.compute-tag.outputs.is_release }}
      release_tag: ${{ steps.compute-tag.outputs.release_tag }}
    steps:
      - name: Compute Tag
        uses: actions/github-script@v7
        id: compute-tag
        with:
          result-encoding: string
          script: |
            function stripVPrefix(tag) {
              return tag.startsWith('v') ? tag.substring(1) : tag;
            }
            function sanitizeRefName(name) {
              return name.replace(/[^a-zA-Z0-9._-]/g, '-');
            }

            if (context.eventName === "pull_request") {
              core.setOutput("is_release", "false");
              return "pr-" + context.issue.number;
            }
            if (context.eventName === "release") {
              const cleanTag = stripVPrefix(context.payload.release.tag_name);
              core.setOutput("is_release", "true");
              core.setOutput("release_tag", cleanTag);
              return "latest";
            }
            if (context.eventName === "push") {
              core.setOutput("is_release", "false");
              if (context.ref.startsWith("refs/tags/")) {
                const tag = context.ref.slice(10);
                return stripVPrefix(tag);
              }
              if (context.ref === "refs/heads/main") {
                return "latest";
              }
              if (context.ref.startsWith("refs/heads/")) {
                return sanitizeRefName(context.ref.slice(11));
              }
            }
            core.setOutput("is_release", "false");
            return "FALSE";

  build:
    name: ${{ matrix.name }}
    needs: [compute-tag]
    if: github.actor != 'dependabot[bot]'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: AtlasML
            dockerfile: ./atlas/AtlasMl/Dockerfile
            image: ls1intum/edutelligence/atlasml
            context: ./atlas/AtlasMl
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@main
    with:
      image-name: ${{ matrix.image }}
      docker-file: ${{ matrix.dockerfile }}
      docker-context: ${{ matrix.context }}
      tags: ${{ needs.compute-tag.outputs.is_release == 'true' && format('latest,{0}', needs.compute-tag.outputs.release_tag) || needs.compute-tag.outputs.result }}
