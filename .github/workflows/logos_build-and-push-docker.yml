name: Logos - Build

on:
  pull_request:
    paths:
      - "logos/**"
      - "shared/**"
      - ".github/workflows/logos_build-and-push-docker.yml"
      - "!logos/README.md"
  push:
    branches:
      - main
    paths:
      - "logos/**"
      - "shared/**"
      - ".github/workflows/logos_build-and-push-docker.yml"
      - "!logos/README.md"
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'ls1intum/edutelligence' }}
    runs-on: aet-large-ubuntu
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Logos Server
            image: logos/logos
            context: .
            file: logos/logos-orchestrator/Dockerfile
          - name: Logos Webservice
            image: logos/logos-webservice
            context: ./logos/logos-webservice
            file: ./logos/logos-webservice/Dockerfile
          - name: Logos UI
            image: logos/logos-ui
            context: ./logos/logos-ui
            file: ./logos/logos-ui/Dockerfile
          - name: Logos DB
            image: logos/logos-db
            context: ./logos/db
            file: ./logos/db/Dockerfile
          - name: Logos Worker Node (vLLM)
            image: logos/logos-workernode-vllm
            context: ./logos/logos-workernode
            file: ./logos/logos-workernode/Dockerfile
            build-args: |
              BASE_IMAGE=nvidia/cuda:13.1.1-cudnn-devel-ubuntu24.04
              RUNTIME_IMAGE=nvidia/cuda:13.1.1-cudnn-runtime-ubuntu24.04
              INSTALL_VLLM=1
              INSTALL_OLLAMA=0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.LOGOS_HARBOR_REGISTRY }}
          username: ${{ vars.LOGOS_HARBOR_USER }}
          password: ${{ secrets.LOGOS_HARBOR_PASSWORD }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.LOGOS_HARBOR_REGISTRY }}/${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          provenance: false
