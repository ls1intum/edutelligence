name: Logos - Build

on:
  pull_request:
    paths:
      - "logos/**"
      - "shared/**"
      - ".github/workflows/logos_build-and-push-docker.yml"
      - "!logos/README.md"
  push:
    branches:
      - main
    paths:
      - "logos/**"
      - "shared/**"
      - ".github/workflows/logos_build-and-push-docker.yml"
      - "!logos/README.md"
  release:
    types:
      - created

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-server:
    name: Build Logos Server
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'ls1intum/edutelligence' }}
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      context: .
      file: ./logos/Dockerfile
      platforms: linux/amd64
      runner: amd64
      sign: false
      meta-images: ${{ vars.LOGOS_HARBOR_REGISTRY }}/logos
      meta-tags: |
        type=ref,event=pr
        type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
        type=semver,pattern={{version}}
      meta-flavor: |
        latest=false
    secrets:
      registry-auths: |
        - registry: ${{ vars.LOGOS_HARBOR_REGISTRY }}
          username: ${{ vars.LOGOS_HARBOR_USER }}
          password: ${{ secrets.LOGOS_HARBOR_PASSWORD }}

  build-ui:
    name: Build Logos UI
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'ls1intum/edutelligence' }}
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      context: ./logos/logos-ui
      file: ./logos/logos-ui/Dockerfile
      platforms: linux/amd64
      runner: amd64
      sign: false
      meta-images: ${{ vars.LOGOS_HARBOR_REGISTRY }}/logos-ui
      meta-tags: |
        type=ref,event=pr
        type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
        type=semver,pattern={{version}}
      meta-flavor: |
        latest=false
    secrets:
      registry-auths: |
        - registry: ${{ vars.LOGOS_HARBOR_REGISTRY }}
          username: ${{ vars.LOGOS_HARBOR_USER }}
          password: ${{ secrets.LOGOS_HARBOR_PASSWORD }}

  build-landing:
    name: Build Logos Landing
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'ls1intum/edutelligence' }}
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      context: ./logos/logos-landing
      file: ./logos/logos-landing/Dockerfile
      platforms: linux/amd64
      runner: amd64
      sign: false
      meta-images: ${{ vars.LOGOS_HARBOR_REGISTRY }}/logos-landing
      meta-tags: |
        type=ref,event=pr
        type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
        type=semver,pattern={{version}}
      meta-flavor: |
        latest=false
    secrets:
      registry-auths: |
        - registry: ${{ vars.LOGOS_HARBOR_REGISTRY }}
          username: ${{ vars.LOGOS_HARBOR_USER }}
          password: ${{ secrets.LOGOS_HARBOR_PASSWORD }}

  build-db:
    name: Build Logos DB
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'ls1intum/edutelligence' }}
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      context: ./logos/db
      file: ./logos/db/Dockerfile
      platforms: linux/amd64
      runner: amd64
      sign: false
      meta-images: ${{ vars.LOGOS_HARBOR_REGISTRY }}/logos-db
      meta-tags: |
        type=ref,event=pr
        type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
        type=semver,pattern={{version}}
      meta-flavor: |
        latest=false
    secrets:
      registry-auths: |
        - registry: ${{ vars.LOGOS_HARBOR_REGISTRY }}
          username: ${{ vars.LOGOS_HARBOR_USER }}
          password: ${{ secrets.LOGOS_HARBOR_PASSWORD }}

  build-workernode-vllm:
    name: Build Logos Worker Node (vLLM)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'ls1intum/edutelligence' }}
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      context: ./logos/logos-workernode
      file: ./logos/logos-workernode/Dockerfile
      platforms: linux/amd64
      runner: amd64
      sign: false
      build-args: |
        BASE_IMAGE=nvidia/cuda:13.1.1-cudnn-devel-ubuntu24.04
        RUNTIME_IMAGE=nvidia/cuda:13.1.1-cudnn-runtime-ubuntu24.04
        INSTALL_VLLM=1
        INSTALL_OLLAMA=0
      meta-images: ${{ vars.LOGOS_HARBOR_REGISTRY }}/logos-workernode-vllm
      meta-tags: |
        type=ref,event=pr
        type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
        type=semver,pattern={{version}}
      meta-flavor: |
        latest=false
    secrets:
      registry-auths: |
        - registry: ${{ vars.LOGOS_HARBOR_REGISTRY }}
          username: ${{ vars.LOGOS_HARBOR_USER }}
          password: ${{ secrets.LOGOS_HARBOR_PASSWORD }}

  build-workernode-ollama:
    name: Build Logos Worker Node (Ollama)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'ls1intum/edutelligence' }}
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      context: ./logos/logos-workernode
      file: ./logos/logos-workernode/Dockerfile
      platforms: linux/amd64
      runner: amd64
      sign: false
      build-args: |
        BASE_IMAGE=python:3.12-slim
        INSTALL_VLLM=0
        INSTALL_OLLAMA=1
      meta-images: ${{ vars.LOGOS_HARBOR_REGISTRY }}/logos-workernode-ollama
      meta-tags: |
        type=ref,event=pr
        type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
        type=semver,pattern={{version}}
      meta-flavor: |
        latest=false
    secrets:
      registry-auths: |
        - registry: ${{ vars.LOGOS_HARBOR_REGISTRY }}
          username: ${{ vars.LOGOS_HARBOR_USER }}
          password: ${{ secrets.LOGOS_HARBOR_PASSWORD }}
