name: Logos - Build

on:
  pull_request:
    paths:
      - "logos/**"
      - "shared/**"
      - ".github/workflows/logos_build-and-push-docker.yml"
      - "!logos/README.md"
  push:
    branches:
      - main
    paths:
      - "logos/**"
      - "shared/**"
      - ".github/workflows/logos_build-and-push-docker.yml"
      - "!logos/README.md"
  release:
    types:
      - created

jobs:
  compute-tag:
    name: Compute tag
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'ls1intum/edutelligence' }}
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.compute-tag.outputs.result }}
      is_release: ${{ steps.compute-tag.outputs.is_release }}
      release_tag: ${{ steps.compute-tag.outputs.release_tag }}
    steps:
      - name: Compute Tag
        uses: actions/github-script@v7
        id: compute-tag
        with:
          result-encoding: string
          script: |
            function stripVPrefix(tag) {
              return tag.startsWith('v') ? tag.substring(1) : tag;
            }

            if (context.eventName === "pull_request") {
              core.setOutput("is_release", "false");
              return "pr-" + context.issue.number;
            }
            if (context.eventName === "release") {
              const cleanTag = stripVPrefix(context.payload.release.tag_name);
              core.setOutput("is_release", "true");
              core.setOutput("release_tag", cleanTag);
              return "latest";
            }
            if (context.eventName === "push") {
              core.setOutput("is_release", "false");
              if (context.ref.startsWith("refs/tags/")) {
                const tag = context.ref.slice(10);
                return stripVPrefix(tag);
              }
              if (context.ref === "refs/heads/main") {
                return "latest";
              }
            }
            core.setOutput("is_release", "false");
            return "FALSE";

  # ---------------------------------------------------------------------------
  # Detect which components actually changed to skip unnecessary builds.
  # On release events, all components are built regardless of changes.
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect changed components
    needs: [compute-tag]
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      ui: ${{ steps.filter.outputs.ui }}
      landing: ${{ steps.filter.outputs.landing }}
      db: ${{ steps.filter.outputs.db }}
      workernode: ${{ steps.filter.outputs.workernode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'logos/src/**'
              - 'logos/db/**'
              - 'logos/tests/**'
              - 'logos/pyproject.toml'
              - 'logos/Dockerfile'
              - 'shared/**'
              - '.github/workflows/logos_build-and-push-docker.yml'
            ui:
              - 'logos/logos-ui/**'
              - '.github/workflows/logos_build-and-push-docker.yml'
            landing:
              - 'logos/logos-landing/**'
              - '.github/workflows/logos_build-and-push-docker.yml'
            db:
              - 'logos/db/**'
              - '.github/workflows/logos_build-and-push-docker.yml'
            workernode:
              - 'logos/logos-workernode/**'
              - '.github/workflows/logos_build-and-push-docker.yml'

  build-and-push-server:
    name: Build Logos Server
    needs: [compute-tag, detect-changes]
    if: ${{ needs.detect-changes.outputs.server == 'true' || github.event_name == 'release' }}
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@main
    with:
      image-name: ghcr.io/ls1intum/edutelligence/logos
      docker-file: ./logos/Dockerfile
      docker-context: .
      tags: ${{ needs.compute-tag.outputs.is_release == 'true' && format('ghcr.io/ls1intum/edutelligence/logos:latest,ghcr.io/ls1intum/edutelligence/logos:{0}', needs.compute-tag.outputs.release_tag) || format('ghcr.io/ls1intum/edutelligence/logos:{0}', needs.compute-tag.outputs.result) }}

  build-and-push-ui:
    name: Build Logos UI
    needs: [compute-tag, detect-changes]
    if: ${{ needs.detect-changes.outputs.ui == 'true' || github.event_name == 'release' }}
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@main
    with:
      image-name: ghcr.io/ls1intum/edutelligence/logos-ui
      docker-file: ./logos/logos-ui/Dockerfile
      docker-context: ./logos/logos-ui
      tags: ${{ needs.compute-tag.outputs.is_release == 'true' && format('ghcr.io/ls1intum/edutelligence/logos-ui:latest,ghcr.io/ls1intum/edutelligence/logos-ui:{0}', needs.compute-tag.outputs.release_tag) || format('ghcr.io/ls1intum/edutelligence/logos-ui:{0}', needs.compute-tag.outputs.result) }}

  build-and-push-landing:
    name: Build Logos Landing
    needs: [compute-tag, detect-changes]
    if: ${{ needs.detect-changes.outputs.landing == 'true' || github.event_name == 'release' }}
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@main
    with:
      image-name: ghcr.io/ls1intum/edutelligence/logos-landing
      docker-file: ./logos/logos-landing/Dockerfile
      docker-context: ./logos/logos-landing
      tags: ${{ needs.compute-tag.outputs.is_release == 'true' && format('ghcr.io/ls1intum/edutelligence/logos-landing:latest,ghcr.io/ls1intum/edutelligence/logos-landing:{0}', needs.compute-tag.outputs.release_tag) || format('ghcr.io/ls1intum/edutelligence/logos-landing:{0}', needs.compute-tag.outputs.result) }}

  build-and-push-db:
    name: Build Logos DB
    needs: [compute-tag, detect-changes]
    if: ${{ needs.detect-changes.outputs.db == 'true' || github.event_name == 'release' }}
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@main
    with:
      image-name: ghcr.io/ls1intum/edutelligence/logos-db
      docker-file: ./logos/db/Dockerfile
      docker-context: ./logos/db
      tags: ${{ needs.compute-tag.outputs.is_release == 'true' && format('ghcr.io/ls1intum/edutelligence/logos-db:latest,ghcr.io/ls1intum/edutelligence/logos-db:{0}', needs.compute-tag.outputs.release_tag) || format('ghcr.io/ls1intum/edutelligence/logos-db:{0}', needs.compute-tag.outputs.result) }}

  build-and-push-workernode-vllm:
    name: Build Logos Worker Node (vLLM)
    needs: [compute-tag, detect-changes]
    if: ${{ needs.detect-changes.outputs.workernode == 'true' || github.event_name == 'release' }}
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@main
    with:
      image-name: ghcr.io/ls1intum/edutelligence/logos-workernode-vllm
      docker-file: ./logos/logos-workernode/Dockerfile
      docker-context: ./logos/logos-workernode
      build-args: |
        BASE_IMAGE=nvidia/cuda:13.2.0-cudnn-devel-ubuntu24.04
        INSTALL_VLLM=1
        INSTALL_OLLAMA=0
      tags: ${{ needs.compute-tag.outputs.is_release == 'true' && format('ghcr.io/ls1intum/edutelligence/logos-workernode-vllm:latest,ghcr.io/ls1intum/edutelligence/logos-workernode-vllm:{0}', needs.compute-tag.outputs.release_tag) || format('ghcr.io/ls1intum/edutelligence/logos-workernode-vllm:{0}', needs.compute-tag.outputs.result) }}

  build-and-push-workernode-ollama:
    name: Build Logos Worker Node (Ollama)
    needs: [compute-tag, detect-changes]
    if: ${{ needs.detect-changes.outputs.workernode == 'true' || github.event_name == 'release' }}
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@main
    with:
      image-name: ghcr.io/ls1intum/edutelligence/logos-workernode-ollama
      docker-file: ./logos/logos-workernode/Dockerfile
      docker-context: ./logos/logos-workernode
      build-args: |
        BASE_IMAGE=python:3.12-slim
        INSTALL_VLLM=0
        INSTALL_OLLAMA=1
      tags: ${{ needs.compute-tag.outputs.is_release == 'true' && format('ghcr.io/ls1intum/edutelligence/logos-workernode-ollama:latest,ghcr.io/ls1intum/edutelligence/logos-workernode-ollama:{0}', needs.compute-tag.outputs.release_tag) || format('ghcr.io/ls1intum/edutelligence/logos-workernode-ollama:{0}', needs.compute-tag.outputs.result) }}
